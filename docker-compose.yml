services:
  mysql:
    image: mysql:8.4
    container_name: gestao-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gestao_empresa
      MYSQL_USER: gestao
      MYSQL_PASSWORD: gestao
    ports:
      - "3306:3306"
    volumes:
      - gestao_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ugestao", "-pgestao"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  gestao_mysql_data:
